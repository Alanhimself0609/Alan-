<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>P1 WebGIS二维个人作品集</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header>
    <div>
      <h1>WebGIS二维开发与个人GIS作品集（P1）</h1>
      <p>Leaflet 交互地图 + GeoJSON 专题制图 + MapLibre 矢量瓦片与三维拉伸</p>
    </div>
    <div class="badge">GIS Engineering & Development</div>
  </header>
  <main>
    <aside>
      <section class="card">
        <h2>地图模块</h2>
        <button class="tab active" data-target="leafletPanel">Leaflet交互地图</button>
        <button class="tab" data-target="maplibrePanel">MapLibre矢量地图</button>
      </section>
      <section class="card">
        <h2>地图书签</h2>
        <button class="bookmark" data-lat="29.49718" data-lng="106.57655" data-zoom="16">重庆交通大学</button>
        <button class="bookmark" data-lat="29.56130" data-lng="106.58430" data-zoom="14">渝中半岛</button>
        <button class="bookmark" data-lat="29.61215" data-lng="106.55145" data-zoom="14">重庆北站</button>
        <button id="measureBtn">距离测量：关闭</button>
        <button id="clearMeasureBtn">清除测量</button>
      </section>
      <section class="card">
        <h2>专题图说明</h2>
        <p><strong>分级设色：</strong>按人口密度从浅到深表示中心城区空间强度。</p>
        <p><strong>比例符号：</strong>POI 综合指数越高，圆点半径越大。</p>
        <p><strong>交互：</strong>悬停高亮，点击弹窗，图例与信息面板同步。</p>
      </section>
      <section class="card" id="infoPanel">
        <h2>信息面板</h2>
        <p>移动鼠标查看坐标；点击区域或标注查看属性。</p>
      </section>
    </aside>
    <section class="mapWrap panel active" id="leafletPanel">
      <div id="leafletMap"></div>
      <div id="coordinateBox">Lng: --, Lat: --</div>
      <div id="distanceBox">测量距离：0 m</div>
    </section>
    <section class="mapWrap panel" id="maplibrePanel">
      <div id="maplibreMap"></div>
      <div class="floatingTools">
        <button id="styleBlue">蓝色专题</button>
        <button id="styleGreen">绿色专题</button>
        <button id="resetMapLibre">复位视角</button>
      </div>
    </section>
  </main>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
